name: Frontend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Diagnose Repository Structure
      run: |
        echo "=== CARPETAS EN EL SERVIDOR ==="
        ls -la
        echo "=== BUSCANDO EN LOGS EL PACKAGES ==="
        find . -name "package.json"

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install & Test (Definitivo)
      run: |
        # Buscar dinámicamente dónde está la carpeta del frontend
        FRONTEND_DIR=$(find . -name "package.json" -not -path "*/node_modules/*" -exec dirname {} \;)
        echo "La carpeta real es: $FRONTEND_DIR"
        cd "$FRONTEND_DIR"
        npm install
        npm run lint
        npm run build --if-present